<div class="main-plate text-center text-white">
    <div class=" main-plate-content">
        <h1>Mon compte</h1>
    </div>
</div>
<div class="container">
    <form>
        <div class="mb-3">
            <label for="NomInput" class="form-label">Nom</label>
            <input type="text" class="form-control" id="NomInput" placeholder="Votre nom" value="John" name="Nom">
        </div>
        <div class="mb-3">
            <label for="PrénomInput" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="PrénomInput" placeholder="Votre prénom" value="Doe" name="Prénom">
        </div>
        <div class="mb-3">
            <label for="AllergiesInput" class="form-label">Allergies</label>
            <input type="text" class="form-control" id="AllergiesInput"
                placeholder="Vos allergies (fruits de mer, arachides...)" value="Arachides" name="Allergies">
        </div>
        <div class="mb-3">
            <label for="NbconvivesInput" class="form-label">Nombre de convives habituel</label>
            <input type="number" class="form-control" id="NbconvivesInput"
                placeholder="Combien êtes-vous habituellement?" value="4" name="Nbconvives">
        </div>

        <div class="d-flex justify-content-center gap-3" >
            <button type="submit" class="btn btn-primary">Modifer vos informations</button>
            <button type="button" class="btn btn-danger">Supprimer mon compte</button>
        </div>
    </form>

        <div class="text-center text-primary pt-3">
            <a href="/editPassword">Cliquez ici pour changer votre mot de passe</a>
        </div>

</div>
