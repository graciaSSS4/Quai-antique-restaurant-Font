<div class="main-plate text-center text-white">
    <div class=" main-plate-content">
        <h1>Ma réservation</h1>
    </div>
</div>

<div class="container">
    <form>
        <div class="mb-3">
            <label for="NomInput" class="form-label">Nom</label>
            <input disabled type="text" class="form-control" id="NomInput" placeholder="Votre nom" value="John"
                name="Nom">
        </div>
        <div class="mb-3">
            <label for="PrénomInput" class="form-label">Prénom</label>
            <input disabled type="text" class="form-control" id="PrénomInput" placeholder="Votre prénom" value="Doe"
                name="Prénom">
        </div>
        <div class="mb-3">
            <label for="AllergiesInput" class="form-label">Allergies</label>
            <input type="text" class="form-control" id="AllergiesInput"
                placeholder="Vos allergies (fruits de mer, arachides...)" value="Arachides" name="Allergies">
        </div>
        <div class="mb-3">
            <label for="NbconvivesInput" class="form-label">Nombre de convives habituel</label>
            <input type="number" class="form-control" id="NbconvivesInput" placeholder="Nombre de convives habituel"
                value="4" name="Nbconvives">
        </div>
        <div class="mb-3">
            <label for="DateInput" class="form-label">Date</label>
            <input type="date" class="form-control" id="DateInput" placeholder="jj/mm/aaaa" value="jj/mm/aaaa"
                name="Date">
        </div>
        <div class="mb-3">
            <div class="form-check">
                <input class="form-check-input" type="radio" name="serviceChoisi" id="midiRadio">
                <label class="form-check-label" for="midiRadio">
                    Midi
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="serviceChoisi" id="soirRadio" checked>
                <label class="form-check-label" for="soirRadio">
                    Soir
                </label>
            </div>
        </div>
        <div class="mb-3">
            <label for="selectHour" class="form-label">Heure Midi</label>
            <select class="form-select" id="selectHour" name="Heure">
                <option>12:00</option>
                <option>12:15</option>
                <option>12:30</option>
                <option>12:45</option>
                <option>13:00</option>
                <option>13:15</option>
                <option>13:30</option>
                <option>13:45</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="selectHour" class="form-label">Heure Soir</label>
            <select class="form-select" id="selectHour" name="Heure">
                <option>19:30</option>
                <option>19:45</option>
                <option>20:00</option>
                <option>20:15</option>
                <option>20:30</option>
                <option>20:45</option>
                <option>21:00</option>
            </select>
        </div>

        <div class="d-flex justify-content-center gap-3">
            <button type="submit" class="btn btn-primary">Réserver</button>
            <button type="button" class="btn btn-danger">Annuler</button>
        </div>
    </form>
</div>
